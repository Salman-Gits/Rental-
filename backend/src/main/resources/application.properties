# ==========================================
# SPRING RUNTIME & MAIN PORT
# ==========================================
server.port=8080
spring.application.name=electro-rent-backend

# ==========================================
# MYSQL CONNECTION POOL CONFIGURATIONS
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/electrorent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_secure_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE SPECIFICS
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' automatically applies database schema modifications on server bootstrap
spring.jpa.hibernate.ddl-auto=update
# Displays executed SQL statements in console logs (helpful for local auditing)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# INITIAL SEED CONTROL
# ==========================================
# Initialize custom SQL if needed
spring.sql.init.mode=always
